<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: Arial; background: #eef1ff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        
        .input-group { position: relative; width: 100%; margin: 15px 0; }
        input { width: 100%; padding: 12px; padding-right: 40px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; }
        
        button { width: 100%; padding: 12px; background: #5f2eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Reset Password</h2>
        <p style="font-size: 13px; color: #666;">Konfirmasi username dan masukkan password baru.</p>
        
        <form method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Masukkan Username Anda" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" id="new_password" placeholder="Password Baru" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePass('new_password', this)"></i>
            </div>

            <button type="submit">Update Password</button>
        </form>
    </div>

    <script>
        function togglePass(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
