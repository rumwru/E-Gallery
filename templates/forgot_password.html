<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password</title>
    <style>
        body { font-family: Arial; background: #eef1ff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5f2eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Lupa Password?</h2>
        <p style="font-size: 13px; color: #666;">Masukkan usename kamu untuk mendapatkan link reset di terminal.</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Masukkan Username kamu" required>
            <button type="submit">Kirim Link Reset</button>
        </form>
    </div>
</body>
</html>
